name: Generate CV PDF

on:
  push:
    branches: [main]
    paths: ['cv.html', 'cv-lite.html']

permissions:
  contents: write

jobs:
  generate-pdf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install puppeteer pdf-lib

      - name: Generate CV PDF
        run: node generate-cv.js

      - name: Commit and push PDFs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cv.pdf cv-lite.pdf
          git diff --staged --quiet || (git commit -m "Auto-generate cv.pdf and cv-lite.pdf [skip ci]" && git push)
