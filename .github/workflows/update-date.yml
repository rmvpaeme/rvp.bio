name: Update "Last updated" date

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  update-date:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update date in footer
        run: |
          DATE=$(date +'%B %Y')
          sed -i "s/Last updated [A-Za-z]* [0-9]*/Last updated $DATE/" index.html

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || (git commit -m "Update last updated date [skip ci]" && git push)
